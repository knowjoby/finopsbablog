title: "FinOps for POs"
description: "Cloud cost management and invoice intelligence — explained for Product Owners."
baseurl: ""
url: "https://knowjoby.github.io"
author:
  name: "Joby John"
  email: "blogspace1989@gmail.com"

theme: minima
future: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag

permalink: /:categories/:year/:month/:day/:title/

minima:
  skin: classic
  date_format: "%B %-d, %Y"

feed:
  posts_limit: 20

exclude:
  - state/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .setup-complete
  - run-daily.sh
  - _drafts/
